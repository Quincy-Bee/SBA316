<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Team Builder</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./scripts.js" defer></script>
</head>

<body>
    <h1>Pokemon Team Builder</h1>

    <p>welcome to Pokemon team builder! You can add pokemon to a team, remove, mark your favorites and view details like
        name, type and pictures.</p>

    <div class="parent-container">

        <div id="mainImage">
            <img src="./Images/The_Phenomenal_Firepower_of_Charizard_-_The_Ultimate_Pokemon_600x600_crop_center.webp"
                alt="charizard picture" class="pokemon-option" data-name="Charizard">

            <img src="./Images/ab67616d00001e024aa1d0f84acdb0138d971e21.jpeg" alt="Pikachu picture" class="pokemon-option" data-name="Pikachu">

            <img src="./Images/2024-02-28_a3e4320206bf58.webp" alt="squirtle picture" class="pokemon-option" data-name="Squirtle">

            <img src="./Images/images.jpeg" alt="Kazaam picture" class="pokemon-option" data-name="Kadabra">

        </div></div>

<form id="pokemonForm">
    <input id="pokemonInput" placeholder="Enter Pokemon name" required minlength="3">
    <button type="submit">Add Pokemon</button>
</form>

<p id="message"></p>

<div id="pokeContainer"></div>

</body>

</html>
